name: Update CLI Docs

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  BRANCH: actions/update-cli-docs

concurrency:
  group: ${{ github.workflow }}

jobs:
  update-cli-docs:
    name: Update CLI Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Sprites CLI
        run: |
          curl -fsSL https://sprites.dev/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Setup Sprites auth
        run: sprite auth setup --token "$SPRITES_TEST_TOKEN"
        env:
          SPRITES_TEST_TOKEN: ${{ secrets.SPRITES_TEST_TOKEN }}

      - name: Generate CLI Docs
        run: pnpm generate:cli-docs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/content/docs/cli/commands.mdx
          then
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "CLI docs are already up to date."
          else
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Updated CLI docs"
              git diff src/content/docs/cli/commands.mdx
          fi

      - name: Generate app token
        if: steps.changes.outputs.changed == 'true'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.SPRITES_BOT_APP_ID }}
          private-key: ${{ secrets.SPRITES_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Commit to automated branch
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Since we're authed as a bot user, create the commit using the
          # GraphQL API.
          HEAD_OID="$(git rev-parse HEAD)"

          gh api graphql \
            -F expectedHeadOid="$HEAD_OID" \
            -f query='mutation($expectedHeadOid: GitObjectID!) {
              updateRefs(input: {
                repositoryId: "${{ github.event.repository.node_id }}",
                refUpdates: [{
                  afterOid: $expectedHeadOid,
                  force: true,
                  name: "refs/heads/${{ env.BRANCH }}"
                }]
              }) { clientMutationId }
            }'

          gh api graphql \
            -F headline="Update auto-generated CLI documentation ($(date -u +%Y-%m-%d))" \
            -F expectedHeadOid="$(git rev-parse HEAD)" \
            -F additions[][path]=src/content/docs/cli/commands.mdx \
            -F additions[][contents]="$(base64 -w 0 src/content/docs/cli/commands.mdx)" \
            -f query='mutation(
              $headline: String!,
              $expectedHeadOid: GitObjectID!,
              $additions: [FileAddition!]!
            ) {
              createCommitOnBranch(input: {
                branch: {
                  repositoryNameWithOwner: "${{ github.repository }}",
                  branchName: "${{ env.BRANCH }}"
                },
                expectedHeadOid: $expectedHeadOid,
                fileChanges: { additions: $additions },
                message: { headline: $headline }
              }) { commit { url } }
            }'

      - name: Open or update PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cat > /tmp/pr-body.md << EOF
          Built from $(sprite --version) on $(date -u +%Y-%m-%d)

          > *Generated by the weekly CLI docs update workflow. This PR is automatically updated when new releases are available.*
          EOF

          pr=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if test -z "$pr"
          then
              gh pr create \
                  --title "Update auto-generated CLI documentation" \
                  --body-file /tmp/pr-body.md \
                  --head "$BRANCH" \
                  --base main
          else
              gh pr edit "$pr" --body-file /tmp/pr-body.md
              echo "Updated existing PR #$pr"
          fi
